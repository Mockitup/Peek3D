<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>/* __CSS__ */</style>
</head>
<body>
  <div id="titlebar">
    <div class="titlebar-actions">
      <button id="btn-open" tabindex="-1" title="Open (Ctrl+O)">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 13V4.5a1 1 0 0 1 1-1h3l1.5 1.5H13a1 1 0 0 1 1 1V13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button id="btn-prev" tabindex="-1" title="Previous Model (Left Arrow)">
        <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btn-next" tabindex="-1" title="Next Model (Right Arrow)">
        <svg viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="titlebar-sep"></div>
      <button id="btn-wireframe" tabindex="-1" title="Wireframe (W)">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 2L2 6v5l6 3 6-3V6L8 2z" stroke="currentColor" stroke-width="1.1"/><path d="M2 6l6 3 6-3M8 9v5" stroke="currentColor" stroke-width="1.1"/></svg>
      </button>
      <button id="btn-grid" tabindex="-1" title="Grid (G)" class="active">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 2h12v12H2zM2 6h12M2 10h12M6 2v12M10 2v12" stroke="currentColor" stroke-width="1.0"/></svg>
      </button>
      <button id="btn-reset" tabindex="-1" title="Reset View (R)">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 0 1 10.47-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M14 8a6 6 0 0 1-10.47 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M12.47 1v3h-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.53 15v-3h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btn-orient" tabindex="-1" title="Orient to Ground (E)">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 2v8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <span id="titlebar-title">Peek3D</span>
    <div id="window-controls">
      <button id="btn-theme" tabindex="-1" title="Toggle Theme">
        <svg id="icon-sun" viewBox="0 0 16 16" fill="none" style="display:none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.2"/><path d="M8 2v1.5M8 12.5V14M2 8h1.5M12.5 8H14M3.75 3.75l1.06 1.06M11.19 11.19l1.06 1.06M3.75 12.25l1.06-1.06M11.19 4.81l1.06-1.06" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <svg id="icon-moon" viewBox="0 0 16 16" fill="none"><path d="M13.5 8.5a5.5 5.5 0 0 1-6-6 5.5 5.5 0 1 0 6 6z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      </button>
      <div class="window-controls-sep"></div>
      <button id="btn-minimize" tabindex="-1" title="Minimize">
        <svg viewBox="0 0 10 10"><line x1="2" y1="5" x2="8" y2="5"/></svg>
      </button>
      <button id="btn-maximize" tabindex="-1" title="Maximize">
        <svg viewBox="0 0 10 10"><rect x="1.5" y="1.5" width="7" height="7" rx="1"/></svg>
      </button>
      <button id="btn-close" tabindex="-1" title="Close">
        <svg viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg>
      </button>
    </div>
  </div>

  <div id="content">
    <div id="viewer-container">
      <div id="welcome-panel">
        <div class="welcome-icon">
          <svg viewBox="0 0 48 48" fill="none">
            <path d="M24 6L6 16v16l18 10 18-10V16L24 6z" stroke="currentColor" stroke-width="2"/>
            <path d="M6 16l18 10 18-10" stroke="currentColor" stroke-width="2"/>
            <path d="M24 26v16" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <div class="welcome-text">Drop a 3D model or press Ctrl+O</div>
        <div class="welcome-formats">STL, OBJ files</div>
      </div>
      <div id="loading-spinner"></div>
    </div>
  </div>

  <div id="zoom-toast"></div>

  <div id="drop-overlay">
    <div class="drop-message">Drop to open</div>
  </div>

  <div id="statusbar">
    <span id="status-filename"></span>
    <span id="status-vertices"></span>
    <span id="status-faces"></span>
    <span id="status-filesize"></span>
    <span id="status-right">
      <span id="status-nav"></span>
    </span>
  </div>

  <!-- __SCRIPTS__ -->
</body>
</html>
